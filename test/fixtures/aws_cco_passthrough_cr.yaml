apiVersion: rhtpa.io/v1
kind: TrustedProfileAnalyzer
metadata:
  name: aws-cco-passthrough-instance
  namespace: test-namespace
spec:
  appDomain: test.example.com
  replicas: 1
  cloudProvider: aws
  ccoMode: passthrough
  cloudCredentials:
    aws:
      statementEntries:
        - effect: Allow
          action:
            - "s3:GetObject"
            - "s3:PutObject"
            - "s3:DeleteObject"
            - "s3:ListBucket"
          resource: "*"
  storage:
    type: s3
    bucket: trustify-storage
    region: us-east-1
  modules:
    server:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
    importer:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
  oidc:
    clients:
      frontend:
        clientId: test-frontend
      cli:
        clientSecret: test-secret
  database:
    host: postgres.test.svc
    name: testdb
    username: testuser
    password: testpass
  metrics:
    enabled: false
  tracing:
    enabled: false
