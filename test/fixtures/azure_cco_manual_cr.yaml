apiVersion: rhtpa.io/v1
kind: TrustedProfileAnalyzer
metadata:
  name: azure-cco-manual-instance
  namespace: test-namespace
spec:
  appDomain: test.example.com
  replicas: 1
  cloudProvider: azure
  ccoMode: manual
  cloudCredentials:
    azure:
      roleBindings:
        - role: Contributor
          scope: /subscriptions/00000000-0000-0000-0000-000000000000
      azureClientID: "11111111-1111-1111-1111-111111111111"
      azureTenantID: "22222222-2222-2222-2222-222222222222"
      azureSubscriptionID: "00000000-0000-0000-0000-000000000000"
      azureRegion: eastus
  storage:
    type: s3
    bucket: trustify-storage
    region: eastus
  modules:
    server:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
    importer:
      enabled: true
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
  oidc:
    clients:
      frontend:
        clientId: test-frontend
      cli:
        clientSecret: test-secret
  database:
    host: postgres.test.svc
    name: testdb
    username: testuser
    password: testpass
  metrics:
    enabled: false
  tracing:
    enabled: false
