apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
  namespace: e2e-test
  labels:
    app: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rustfs
  template:
    metadata:
      labels:
        app: rustfs
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: rustfs
          image: rustfs/rustfs:latest
          env:
            - name: RUSTFS_ROOT_USER
              value: rustfsadmin
            - name: RUSTFS_ROOT_PASSWORD
              value: rustfsadmin
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rustfs
  namespace: e2e-test
spec:
  selector:
    app: rustfs
  ports:
    - port: 9000
      targetPort: 9000
      name: s3
  type: ClusterIP
