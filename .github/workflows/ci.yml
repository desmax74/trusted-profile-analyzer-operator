name: CI

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true

      - name: Verify generated code is up-to-date
        run: |
          make manifests generate
          if ! git diff --quiet; then
            echo "::error::Generated code is out of date. Run 'make manifests generate' and commit the changes."
            git diff
            exit 1
          fi

      - name: Run tests
        run: make test-ci

      - name: Upload coverage
        if: always() && hashFiles('cover.out') != ''
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: cover.out
          retention-days: 7

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify build
        run: go build -o /dev/null .
