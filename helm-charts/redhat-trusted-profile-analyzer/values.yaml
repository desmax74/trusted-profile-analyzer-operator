appDomain: change-me
partOf: trustify
replicas: 1

image:
  fullName: registry.redhat.io/rhtpa/rhtpa-rhel10@sha256:50b180ea1f47f54da17d985018c7d6cdf9c45652bb0568d7daf2afade961dad6 #@TODO update when el10 rhtpa image will be available
  pullPolicy: IfNotPresent

rust: {}

ingress:
  enabled: true

tls: {}

storage: {}

database: {}

# ccoMode: ""  # default | mint | passthrough | manual

# cloudProvider: aws   # aws | gcp | azure — set to enable CCO-managed credentials for S3 storage
cloudCredentials: {}
  #aws:
  #  statementEntries:
  #    - effect: Allow
  #      action: [ "s3:*" ]
  #      resource: "*"
  #  stsIAMRoleARN: ""   # Required for manual mode (STS)
  #gcp:
  #  permissions:
  #    - storage.objects.get
  #  serviceAccountEmail: ""   # Required for manual mode (WIF)
  #azure:
  #  roleBindings:
  #    - role: Contributor
  #      scope: /subscriptions/<subscription-id>
  #  azureClientID: ""          # Required for manual mode
  #  azureTenantID: ""          # Required for manual mode
  #  azureSubscriptionID: ""
  #  azureRegion: ""

openshift:
  useServiceCa: true

oidc:
  uiScope: ""
  clients:
    frontend: {}
    cli:
      clientSecret:

infrastructure:
  port: 9010

metrics:
  enabled: false

tracing:
  enabled: false

collector: {}

modules:
  server:
    enabled: true
    replicas: 1
    ingress: {}
    image: {}
    infrastructure: {}
    tracing: {}
    metrics: {}
    rust: {}
    resources:
      requests:
        cpu: 1
        memory: 8Gi

  importer:
    enabled: true
    replicas: 1
    image: {}
    infrastructure: {}
    tracing: {}
    metrics: {}
    rust: {}
    resources:
      requests:
        cpu: 1
        memory: 8Gi
    concurrency: 1
    workingDirectory:
      size: 32Gi

  createDatabase:
    enabled: false
    image: {}

  migrateDatabase:
    enabled: false
    image: {}

  createImporters:
    enabled: true
    image: {}
    importers:
      redhat-sboms:
        sbom:
          description: All Red Hat SBOMs
          period: 1d
          source: https://security.access.redhat.com/data/sbom/v1/
          keys:
            - https://security.access.redhat.com/data/97f5eac4.txt#77E79ABE93673533ED09EBE2DCE3823597F5EAC4
          disabled: true
          fetchRetries: 50
      redhat-csaf:
        csaf:
          description: All Red Hat CSAF data
          period: 1d
          source: redhat.com
          disabled: true
          fetchRetries: 50
      cve:
        cve:
          description: CVE list v5
          period: 1d
          source: https://github.com/CVEProject/cvelistV5
          disabled: true
      osv-github:
        osv:
          description: GitHub Advisory Database
          period: 1d
          source: https://github.com/github/advisory-database
          path: advisories
          disabled: true
      quay-redhat-user-workloads:
        quay:
          description: SBOMs from konflux image attachments
          period: 1d
          source: quay.io
          namespace: redhat-user-workloads
          disabled: true
